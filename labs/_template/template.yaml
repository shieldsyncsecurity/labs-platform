Parameters:
  LabSlug:
    Type: String
    Default: TODO-slug  # MUST equal this lab's directory name under labs-platform/labs/
    Description: Tag value stamped on every resource so aws-nuke can target the lab.

Resources:

  # ---------------------------------------------------------------------------
  # TODO 1) First deliberately-flawed resource.
  #   Naming: prefix with sslab-<purpose>-${AWS::AccountId} for S3, or
  #           Path: /lab/ for IAM users/roles the learner interacts with
  #           (the /lab/ path is what learnerPolicy.json scopes IAM actions to —
  #           see labs-platform/labs/_template/learnerPolicy.json).
  #   Every resource needs:
  #     DeletionPolicy: Delete
  #     UpdateReplacePolicy: Delete   (if the resource type supports replacement)
  #     Tags: [{Key: ShieldSyncLab, Value: !Ref LabSlug}]   (if the type supports tags —
  #       IAM::ManagedPolicy and IAM::AccessKey do NOT; aws-nuke falls back to
  #       name/path-prefix targeting for those, with the account-level nuke as backstop)
  # ---------------------------------------------------------------------------
  # ExampleFlawedResource:
  #   Type: AWS::S3::Bucket
  #   DeletionPolicy: Delete
  #   UpdateReplacePolicy: Delete
  #   Properties:
  #     BucketName: !Sub "sslab-TODO-${AWS::AccountId}"
  #     Tags:
  #       - Key: ShieldSyncLab
  #         Value: !Ref LabSlug

  # ---------------------------------------------------------------------------
  # TODO 2) If your scenario needs a seeded state (fake data in a bucket, a
  #   pre-existing object, etc.), you need a custom-resource Lambda that:
  #     - on CREATE: writes the seed data
  #     - on DELETE: EMPTIES anything it wrote, so DeletionPolicy: Delete can
  #       actually delete the parent resource (a non-empty S3 bucket will not
