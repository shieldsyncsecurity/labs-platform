AWSTemplateFormatVersion: "2010-09-09"

Description: >-
  ShieldSync Lab - kms-data-protection (Beginner). A team set up an "encrypted"
  S3 bucket for sensitive exports - but the protection is theatre. A
  'data-analyst' IAM user holds kms:* on ALL keys (so they can DISABLE or
  SCHEDULE DELETION of the key and destroy every object), and the bucket never
  ENFORCES encryption (an upload can override the default with SSE-S3, no
  encryption, or plain HTTP). The learner scopes the analyst to least privilege
  and enforces encryption in transit + at rest. No compute, ~0 cost. us-east-1.

Parameters:
  LabSlug:
    Type: String
    Default: kms-data-protection
    Description: Tag value stamped on taggable resources for aws-nuke targeting.

Resources:

  # Customer-managed key that "protects" the export bucket. The key policy is the
  # standard root-admin pattern (fine) - the danger is the IAM user below, who is
  # delegated full admin over it (and every other key) and can simply delete it.
  LabKey:
    Type: AWS::KMS::Key
    DeletionPolicy: Delete
    Properties:
      Description: ShieldSync lab - data-export encryption key
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: RootAdmin
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"
      Tags:
        - Key: ShieldSyncLab
          Value: !Ref LabSlug

  LabKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/shieldsync-lab-exports
      TargetKeyId: !Ref LabKey

  # The "encrypted" export bucket. Default SSE-KMS IS set - but there is NO bucket
  # policy ENFORCING it, so a client can override the default with SSE-S3, no
  # encryption, or plain HTTP. Encryption you don't enforce isn't encryption you
  # can trust. (Bucket itself is private - this lab is about encryption, not
  # public exposure.)
  ExportsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    Properties:
      BucketName: !Sub "sslab-kms-exports-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !Ref LabKey
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: ShieldSyncLab
          Value: !Ref LabSlug

  # The over-privileged identity. "Just an analyst who reads exports" - but the
  # inline policy grants kms:* on EVERY key (Resource '*'): they can disable or
  # SCHEDULE DELETION of the key (destroying all data), rewrap it, or read
  # anything. It should be kms:Decrypt on the ONE lab key, nothing more.
  DataAnalyst:
    Type: AWS::IAM::User
    DeletionPolicy: Delete
    Properties:
      UserName: data-analyst
      Path: /lab/
      Policies:
        - PolicyName: analyst-overbroad
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: KmsEverything            # <-- FLAW: full KMS admin on all keys
                Effect: Allow
                Action: "kms:*"
                Resource: "*"
              - Sid: BucketReadWrite
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt ExportsBucket.Arn
                  - !Sub "${ExportsBucket.Arn}/*"
      Tags:
        - Key: ShieldSyncLab
          Value: !Ref LabSlug

Outputs:
  KmsKeyId:
    Description: The customer-managed key protecting the exports.
    Value: !Ref LabKey
  KmsKeyAlias:
    Description: Friendly alias for the lab key.
    Value: alias/shieldsync-lab-exports
  ExportsBucketName:
    Description: The "encrypted" export bucket to lock down.
    Value: !Ref ExportsBucket
  OverPrivilegedUser:
    Description: Scope this user to kms:Decrypt on the lab key only.
    Value: !Ref DataAnalyst
  KmsConsoleUrl:
    Description: Jump to KMS keys.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/kms/home?region=${AWS::Region}#/kms/keys"
  S3ConsoleUrl:
    Description: Jump to the exports bucket.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/s3/buckets/sslab-kms-exports-${AWS::AccountId}?region=${AWS::Region}"
  IamUserConsoleUrl:
    Description: Jump to the over-privileged analyst.
    Value: "https://console.aws.amazon.com/iam/home#/users/details/data-analyst"
